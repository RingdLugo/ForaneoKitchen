<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ForananeoKitchen - Inicio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/home.css">
</head>

<body>

    <div class="container">
        <header class="header-green">
            <div class="greeting-section">
                <h1 class="greeting">Hola Karen 👋</h1>
                <p class="question">¿Qué vamos a cocinar hoy?</p>
            </div>
            <div class="premium-badge">
                <span class="crown">👑</span> Premium
            </div>
        </header>
        <div class="search-wrapper">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="Buscar recetas..." />
            </div>
        </div>
        <section class="filters-section">
            <div class="filters-header">
                <span class="filter-icon">▼</span> Filtros:
            </div>
            <div class="filter-tags">
                <span class="tag">Económicas</span>
                <span class="tag">Rápidas</span>
                <span class="tag">Microondas</span>
                <span class="tag">Menos de $30</span>
            </div>
        </section>
        <section class="recipes-section">
            <h2 class="section-title">Recetas Disponibles</h2>

            <div class="recipes-grid">
                <div class="recipe-card">
                    <img src="https://images.unsplash.com/photo-1626800477923-97c5d6d2d36b?w=800&auto=format&fit=crop"
                        alt="Pasta Alfredo" class="recipe-img">
                    <div class="recipe-details">
                        <h3>Pasta Alfredo Económica</h3>
                        <div class="meta">
                            <span class="price">$28 MXN</span>
                            <span class="time">⏱ 15 min</span>
                        </div>
                        <div class="tags">
                            <span>económicas</span>
                            <span>rápidas</span>
                        </div>
                    </div>
                </div>
                <div class="recipe-card">
                    <img src="https://images.unsplash.com/photo-1558327768566-2b5e0c9e2d8c?w=800&auto=format&fit=crop"
                        alt="Tostada plátano" class="recipe-img">
                    <div class="recipe-details">
                        <h3>Tostada de Plátano y Cacahuate</h3>
                        <div class="meta">
                            <span class="price">$18 MXN</span>
                            <span class="time">⏱ 8 min</span>
                        </div>
                        <div class="tags">
                            <span>económicas</span>
                            <span>rápidas</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </div>
    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><span>🏠</span><span>Inicio</span></a>
        <a href="#" class="nav-item"><span>📅</span><span>Planificador</span></a>
        <a href="#" class="nav-item"><span>👥</span><span>Comunidad</span></a>
        <a href="#" class="nav-item"><span>👤</span><span>Perfil</span></a>
    </nav>

</body>

</html>
