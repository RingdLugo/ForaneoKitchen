<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ForananeoKitchen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dark-mode.css">
</head>
<body>
  <button id="dark-mode-toggle" class="dark-mode-toggle" title="Modo oscuro">🌙</button>
  
  <div class="screen">
    <div class="content">
      <div class="logo-circle">
        <img src="images/logo-forananeo.png" alt="ForananeoKitchen Logo" class="logo-img">
      </div>
      <h1>ForananeoKitchen</h1>
      <p class="subtitle">Recetas económicas para estudiantes</p>
      <div class="features">
        <div class="feature-item">
          <div class="icon-bg egg">🔍🥚</div>
          <span>Rápido</span>
        </div>
        <div class="feature-item">
          <div class="icon-bg money">💰</div>
          <span>Económico</span>
        </div>
        <div class="feature-item">
          <div class="icon-bg smile">😋</div>
          <span>Delicioso</span>
        </div>
      </div>
      <a href="login.html" class="btn-comenzar">
        <span class="sparkle">✨</span> Comenzar
      </a>
    </div>
  </div>
  
  <script src="js/dark-mode.js"></script>
</body>
</html>
