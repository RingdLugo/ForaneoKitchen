<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ForaneoKitchen - Empieza a Cocinar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dark-mode.css">
  <style>
    /* Estilos Premium para Landing Page */
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    body.dark-mode {
      background: linear-gradient(135deg, #0f1712 0%, #1a2e1f 100%);
    }
    
    /* Background animado */
    .bg-shape {
      position: absolute;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.6;
      animation: float 10s infinite alternate ease-in-out;
    }
    .shape1 { width: 300px; height: 300px; background: #81c784; top: -10%; left: -10%; }
    .shape2 { width: 400px; height: 400px; background: #4caf50; bottom: -10%; right: -10%; animation-delay: -5s; }
    body.dark-mode .shape1 { background: #2e7d32; }
    body.dark-mode .shape2 { background: #1b5e20; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 30px) scale(1.1); }
    }

    /* Glassmorphism Card */
    .screen {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 30px;
      padding: 50px 30px;
      max-width: 450px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
      animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    body.dark-mode .screen {
      background: rgba(20, 30, 22, 0.7);
      border-color: rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #2e7d32, #4caf50);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 20px 0 10px;
      letter-spacing: -1px;
    }
    body.dark-mode h1 {
      background: linear-gradient(135deg, #66bb6a, #a5d6a7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #555;
      font-size: 1.1rem;
      margin-bottom: 30px;
      font-weight: 500;
    }
    body.dark-mode .subtitle { color: #aaa; }

    .features {
      display: flex;
      justify-content: space-around;
      margin-bottom: 40px;
    }

    .feature-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: transform 0.3s;
    }
    .feature-item:hover { transform: translateY(-5px); }

    .icon-bg {
      width: 60px;
      height: 60px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      background: white;
      box-shadow: 0 8px 15px rgba(0,0,0,0.05);
    }
    body.dark-mode .icon-bg {
      background: #2a3d2e;
      box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    }

    .feature-item span {
      font-size: 0.9rem;
      font-weight: 600;
      color: #444;
    }
    body.dark-mode .feature-item span { color: #ddd; }

    .btn-comenzar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #4caf50, #2e7d32);
      color: white;
      text-decoration: none;
      font-family: 'Outfit', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      padding: 16px 40px;
      border-radius: 50px;
      transition: all 0.3s;
      box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
      width: 100%;
    }
    .btn-comenzar:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 15px 25px rgba(76, 175, 80, 0.4);
    }
  </style>
</head>
<body>
  <!-- Fondos dinámicos -->
  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>

  <button id="dark-mode-toggle" class="dark-mode-toggle" title="Modo oscuro">🌙</button>
  
  <div class="screen">
    <div class="content">
      <div style="font-size: 4rem; animation: pulse 2s infinite;">👨‍🍳</div>
      <h1>ForaneoKitchen</h1>
      <p class="subtitle">Recetas épicas y económicas para tu vida de estudiante</p>
      
      <div class="features">
        <div class="feature-item">
          <div class="icon-bg">⚡</div>
          <span>Rápido</span>
        </div>
        <div class="feature-item">
          <div class="icon-bg">💰</div>
          <span>Barato</span>
        </div>
        <div class="feature-item">
          <div class="icon-bg">🤤</div>
          <span>Rico</span>
        </div>
      </div>

      <a href="login.html" class="btn-comenzar">
        <span class="sparkle">✨</span> Entrar a la Cocina
      </a>
    </div>
  </div>
  
  <script src="js/dark-mode.js"></script>
</body>
</html>
