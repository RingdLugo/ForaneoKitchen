<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>ForaneoKitchen - Receta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/receta.css">
  <link rel="stylesheet" href="css/dark-mode.css">
  <link rel="stylesheet" href="css/bottom-nav.css">
</head>
<body>
  <button id="dark-mode-toggle" class="dark-mode-toggle" title="Modo oscuro">🌙</button>

  <div class="receta-screen">
    <button class="back-btn" onclick="window.location.href='home.html'">← Volver a recetas</button>
    <div id="receta-container">
      <div class="receta-loading">
        <div class="loading-spinner"></div>
        <p>Cargando receta...</p>
      </div>
    </div>

    <nav class="bottom-nav">
      <a href="home.html" class="nav-item"><span>🏠</span><span>Inicio</span></a>
      <a href="subir-receta.html" class="nav-item"><span>📝</span><span>Subir</span></a>
      <a href="planificador.html" class="nav-item"><span>📅</span><span>Plan</span></a>
      <a href="comunidad.html" class="nav-item"><span>👥</span><span>Comunidad</span></a>
      <a href="perfil.html" class="nav-item"><span>👤</span><span>Perfil</span></a>
    </nav>

    <!-- Modal para agregar al plan semanal -->
    <div id="modal-plan" class="modal-plan" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
      <div class="modal-content" style="background: var(--card-bg, #fff); width: 90%; max-width: 400px; border-radius: 24px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); animation: slideUp 0.3s ease-out;">
        
        <!-- Paso 1: Elegir día -->
        <div id="plan-paso-1">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="margin: 0; font-size: 1.4rem; color: #1b5e20;">📅 Elegir día</h3>
            <button class="close-plan-modal" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #999;">&times;</button>
          </div>
          <p style="color: #666; margin-bottom: 20px;">¿Qué día quieres cocinar esta receta?</p>
          <div class="plan-grid" style="display: grid; grid-template-columns: 1fr; gap: 10px;">
            <button class="btn-dia" data-dia="lunes">Lunes</button>
            <button class="btn-dia" data-dia="martes">Martes</button>
            <button class="btn-dia" data-dia="miercoles">Miércoles</button>
            <button class="btn-dia" data-dia="jueves">Jueves</button>
            <button class="btn-dia" data-dia="viernes">Viernes</button>
            <button class="btn-dia" data-dia="sabado">Sábado</button>
            <button class="btn-dia" data-dia="domingo">Domingo</button>
          </div>
        </div>

        <!-- Paso 2: Elegir comida -->
        <div id="plan-paso-2" style="display: none;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <button id="btn-volver-paso-1" style="background: none; border: none; color: #4caf50; cursor: pointer; font-weight: 600;">← Volver</button>
            <h3 style="margin: 0; font-size: 1.4rem; color: #1b5e20;">🥣 Momento</h3>
            <button class="close-plan-modal" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #999;">&times;</button>
          </div>
          <p id="texto-dia-seleccionado" style="color: #666; margin-bottom: 20px; font-weight: 500; text-align: center; background: #f1f8e9; padding: 10px; border-radius: 12px;"></p>
          <div class="plan-grid" style="display: grid; grid-template-columns: 1fr; gap: 10px;">
            <button class="btn-comida" data-comida="desayuno">🥐 Desayuno</button>
            <button class="btn-comida" data-comida="comida">🍲 Comida</button>
            <button class="btn-comida" data-comida="cena">🍜 Cena</button>
            <button class="btn-comida" data-comida="merienda">🍎 Merienda</button>
            <button class="btn-comida" data-comida="snack">🍿 Snack</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/supabaseClient.js" type="module"></script>
  <script src="js/receta.js" type="module"></script>
  <script src="js/dark-mode.js"></script>
</body>
</html>
