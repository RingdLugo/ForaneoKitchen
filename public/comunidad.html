<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ForananeoKitchen - Comunidad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/comunidad.css">
  <link rel="stylesheet" href="css/dark-mode.css">
</head>
<body>
  <button id="dark-mode-toggle" class="dark-mode-toggle" title="Modo oscuro">🌙</button>
  
  <div class="comunidad-screen">
    <div class="comunidad-header">
      <h1>👥 Comunidad</h1>
      <p>Descubre recetas de otros usuarios, comenta y comparte</p>
    </div>

    <!-- Tabs -->
    <div class="comunidad-tabs">
      <button class="tab-btn active" data-tab="recetas">📖 Recetas Recientes</button>
      <button class="tab-btn" data-tab="populares">🔥 Populares</button>
      <button class="tab-btn" data-tab="comentarios">💬 Actividad Reciente</button>
    </div>

    <!-- Contenido Recetas -->
    <div id="recetas-tab" class="tab-content active">
      <div id="recetas-comunidad" class="recetas-comunidad">
        <div class="loading-spinner"></div>
      </div>
    </div>

    <!-- Contenido Populares -->
    <div id="populares-tab" class="tab-content" style="display:none;">
      <div id="recetas-populares" class="recetas-comunidad">
        <div class="loading-spinner"></div>
      </div>
    </div>

    <!-- Contenido Comentarios Recientes -->
    <div id="comentarios-tab" class="tab-content" style="display:none;">
      <div id="actividad-reciente" class="actividad-container">
        <div class="loading-spinner"></div>
      </div>
    </div>

    <!-- Modal de comentarios -->
    <div id="modal-comentarios" class="modal-comentarios">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modal-comentarios-titulo">Comentarios</h3>
          <button class="close-modal">&times;</button>
        </div>
        <div id="comentarios-lista" class="comentarios-lista"></div>
        <div class="nuevo-comentario-area">
          <textarea id="nuevo-comentario" placeholder="Escribe un comentario..." rows="2" maxlength="500"></textarea>
          <button id="enviar-comentario">Enviar</button>
        </div>
      </div>
    </div>

    <!-- Modal para responder comentario -->
    <div id="modal-respuesta" class="modal-comentarios">
      <div class="modal-content">
        <div class="modal-header">
          <h3>💬 Responder comentario</h3>
          <button class="close-respuesta-modal">&times;</button>
        </div>
        <div class="respuesta-contexto" id="respuesta-contexto"></div>
        <div class="nuevo-comentario-area">
          <textarea id="respuesta-texto" placeholder="Escribe tu respuesta..." rows="3" maxlength="500"></textarea>
          <button id="enviar-respuesta">Responder</button>
        </div>
      </div>
    </div>

    <nav class="bottom-nav">
      <a href="home.html" class="nav-item">
        <span>🏠</span> Inicio
      </a>
      <a href="subir-receta.html" class="nav-item">
        <span>📝</span> Subir
      </a>
      <a href="planificador.html" class="nav-item">
        <span>📅</span> Planificador
      </a>
      <a href="comunidad.html" class="nav-item active">
        <span>👥</span> Comunidad
      </a>
      <a href="perfil.html" class="nav-item">
        <span>👤</span> Perfil
      </a>
    </nav>
  </div>

  <script src="js/supabaseClient.js" type="module"></script>
  <script src="js/comunidad.js" type="module"></script>
  <script src="js/dark-mode.js"></script>
</body>
</html>
