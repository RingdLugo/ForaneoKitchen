<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ForananeoKitchen - Inicio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/dark-mode.css">
  <style>
    /* Estilos para botones de like/fav en tarjetas */
    .recipe-social {
      display: flex;
      gap: 8px;
      margin: 8px 0;
      align-items: center;
    }
    .btn-like-mini, .btn-fav-mini {
      background: #f5f5f5;
      border: none;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: inherit;
    }
    .btn-like-mini:hover { background: #ffebee; }
    .btn-like-mini.liked { background: #ff5252; color: white; }
    .btn-fav-mini:hover { background: #fff3e0; }
    .btn-fav-mini.favorited { background: #ff9800; color: white; }
    .badge-premium {
      position: absolute;
      top: 10px;
      right: 10px;
      background: linear-gradient(90deg, #ffb300, #ffca28);
      color: #1a3c34;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .recipe-autor {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 8px;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e8f5e9;
      border-top-color: #4caf50;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 60px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .puntos-display {
      color: rgba(255,255,255,0.9);
      font-size: 0.9rem;
      margin-top: 8px;
      display: block;
    }
  </style>
  <link rel="stylesheet" href="css/bottom-nav.css">
</head>
<body>
  <button id="dark-mode-toggle" class="dark-mode-toggle" title="Modo oscuro">🌙</button>

  <div class="home-screen">

    <!-- Header -->
    <header class="header-green">
      <div class="header-top">
        <div class="greeting-section">
          <h1 class="greeting">¡Hola, <span id="user-name">Invitado</span>! 👋</h1>
          <p class="question">¿Qué cocinamos hoy?</p>
          <span id="puntos-display" class="puntos-display">⭐ 0 pts</span>
        </div>
        <div class="header-actions">
          <div id="premium-badge" class="premium-badge" style="display:none;">👑 Premium</div>
          <img id="user-avatar" src="img/default-avatar.png" alt="Perfil" class="header-avatar" onclick="window.location.href='perfil.html'">
        </div>
      </div>
    </header>

    <!-- Búsqueda -->
    <div class="search-wrapper">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="text" placeholder="Buscar recetas económicas...">
      </div>
    </div>

    <!-- Filtros -->
    <div class="filters-section">
      <div class="filters-header">
        <span>🎯</span> Filtros rápidos
      </div>
      <div class="filter-tags">
        <button class="tag active-filter" data-filter="todas">🍽️ Todas</button>
        <button class="tag" data-filter="populares">🔥 Populares</button>
        <button class="tag" data-filter="economicas">💰 Económicas (-$35)</button>
        <button class="tag" data-filter="rapidas">⚡ Rápidas (-20min)</button>
      </div>
    </div>

    <!-- Recetas -->
    <h2 class="section-title">🍳 Recetas</h2>
    <div id="recetas" class="recipes-list">
      <div class="loading-spinner"></div>
    </div>

    <!-- Navegación inferior -->
    <nav class="bottom-nav">
      <a href="home.html" class="nav-item active">
        <span>🏠</span> Inicio
      </a>
      <a href="subir-receta.html" class="nav-item">
        <span>📝</span> Subir
      </a>
      <a href="planificador.html" class="nav-item">
        <span>📅</span> Plan
      </a>
      <a href="comunidad.html" class="nav-item">
        <span>👥</span> Comunidad
      </a>
      <a href="perfil.html" class="nav-item">
        <span>👤</span> Perfil
      </a>
    </nav>
  </div>

  <!-- Chat IA (solo Premium) -->
  <button id="chat-boton" style="display:none;">🤖</button>

  <div id="chat-window" style="display:none;">
    <div id="chat-header">
      🤖 Chef IA
      <button id="cerrar-chat-btn">×</button>
    </div>
    <div id="chat-messages">
      <div class="msg msg-bot">¡Hola! Soy tu Chef IA. ¿En qué puedo ayudarte?</div>
    </div>
    <div id="chat-input-area">
      <input id="chat-input" type="text" placeholder="Pregúntame una receta...">
      <button id="enviar-chat-btn">Enviar</button>
    </div>
  </div>

  <!-- SOLO home.js, SIN login.js (ese era el loop) -->
  <script src="js/supabaseClient.js" type="module"></script>
  <script src="js/home.js" type="module"></script>
  <script src="js/dark-mode.js"></script>
</body>
</html>
