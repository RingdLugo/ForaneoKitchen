<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>ForananeoKitchen - Planificador Semanal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/planificador.css">
  <link rel="stylesheet" href="css/dark-mode.css">
</head>
<body>
  <button id="dark-mode-toggle" class="dark-mode-toggle" title="Modo oscuro">🌙</button>
  
  <div class="planificador-screen">
    <div class="planificador-header">
      <h1>📅 Planificador Semanal</h1>
      <p>Organiza tus comidas - Agrega recetas a cada día</p>
    </div>
    
    <div class="presupuesto-section">
      <div class="presupuesto-info">
        <div class="presupuesto-label">Presupuesto Semanal</div>
        <div class="presupuesto-valor">
          <span class="moneda">$</span>
          <input type="number" id="presupuesto-input" value="500" step="50" min="0">
          <span class="moneda">MXN</span>
        </div>
        <div class="presupuesto-stats">
          <div class="stat">
            <span class="stat-label">Gasto total</span>
            <span class="stat-value gasto" id="gasto-total">$0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Restante</span>
            <span class="stat-value restante" id="restante">$500</span>
          </div>
        </div>
      </div>
      <div class="acciones">
        <button class="btn btn-secondary" id="exportar-pdf-btn">📄 Exportar PDF</button>
        <button class="btn btn-primary" id="lista-compras-btn">📋 Lista de Compras</button>
      </div>
    </div>
    
    <div id="dias-container" class="dias-container"></div>
  </div>
  
  <!-- Modal para seleccionar recetas -->
  <div id="modal-recetas" class="modal-recetas">
    <div class="modal-content">
      <div class="modal-header">
        <h3>📖 Seleccionar receta</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-search">
        <input type="text" id="modal-search-input" placeholder="🔍 Buscar receta...">
      </div>
      <div id="modal-recetas-list" class="modal-recetas-list"></div>
    </div>
  </div>
  
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item">
      <span>🏠</span>
      <span>Inicio</span>
    </a>
    <a href="subir-receta.html" class="nav-item">
      <span>📝</span>
      <span>Subir</span>
    </a>
    <a href="planificador.html" class="nav-item active">
      <span>📅</span>
      <span>Plan</span>
    </a>
    <a href="comunidad.html" class="nav-item">
      <span>👥</span>
      <span>Comunidad</span>
    </a>
    <a href="perfil.html" class="nav-item">
      <span>👤</span>
      <span>Perfil</span>
    </a>
  </nav>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="js/supabaseClient.js" type="module"></script>
  <script src="js/planificador.js" type="module"></script>
  <script src="js/dark-mode.js"></script>
</body>
</html>
